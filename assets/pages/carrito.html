    <main id="contenedor" class="contenedor-carrito">
        
        <h1 class="titulo-carrito">TU CARRITO DE COMPRAS</h1>

        <div id="lista-carrito" class="lista-carrito">
            </div>

        <div class="resumen-carrito">
            <h2>TOTAL: <span class="total-precio">$0.00</span></h2>
            
            <button id="btn-proceder" class="btn-primario" style="width: 100%; margin-top: 15px;">PROCEDER AL PAGO</button>
            
            <div id="contenedor-pago" style="display: none; margin-top: 20px; border-top: 1px solid var(--borde-tarjeta); padding-top: 20px;">
                <h3 style="margin-bottom: 15px; color: var(--color-texto); font-size: 16px; text-align: left;">DATOS DE TARJETA</h3>
                <form id="form-pago">
                    <div class="grupo-input" style="margin-bottom: 15px; text-align: left;">
                        <label style="font-size: 12px; color: var(--texto-secundario);">Nombre en la Tarjeta</label>
                        <input type="text" placeholder="Ej. Eladio Carrion" required style="width: 100%; padding: 12px; background: rgba(9, 3, 15, 0.6); border: 1px solid var(--borde-tarjeta); color: white; border-radius: 5px; outline: none;">
                    </div>
                    
                    <div class="grupo-input" style="margin-bottom: 15px; text-align: left;">
                        <label style="font-size: 12px; color: var(--texto-secundario);">Número de Tarjeta</label>
                        <input type="text" id="num-tarjeta" placeholder="0000 0000 0000 0000" maxlength="19" required style="width: 100%; padding: 12px; background: rgba(9, 3, 15, 0.6); border: 1px solid var(--borde-tarjeta); color: white; border-radius: 5px; outline: none;">
                    </div>
                    
                    <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                        <div class="grupo-input" style="flex: 1; text-align: left;">
                            <label style="font-size: 12px; color: var(--texto-secundario);">Venc. (MM/AA)</label>
                            <input type="text" placeholder="12/28" maxlength="5" required style="width: 100%; padding: 12px; background: rgba(9, 3, 15, 0.6); border: 1px solid var(--borde-tarjeta); color: white; border-radius: 5px; outline: none;">
                        </div>
                        <div class="grupo-input" style="flex: 1; text-align: left;">
                            <label style="font-size: 12px; color: var(--texto-secundario);">CVV</label>
                            <input type="password" placeholder="123" maxlength="4" required style="width: 100%; padding: 12px; background: rgba(9, 3, 15, 0.6); border: 1px solid var(--borde-tarjeta); color: white; border-radius: 5px; outline: none;">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-primario" style="width: 100%; margin-top: 10px; background-color: #8a2be2; box-shadow: 0 0 15px rgba(37, 211, 102, 0.4);">CONFIRMAR PAGO</button>
                </form>
            </div>
        </div>
