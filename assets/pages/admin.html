<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | MCE PRODUCTIONS</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/login.css">
</head>
<body>
    
    <header id="navbar" style="justify-content: space-between;">
        <div class="logo-container">
            <i class='bx bx-shield-quarter' style="font-size: 35px; color: var(--color-primario);"></i>
            <h1 id="logo-texto">PANEL DE CONTROL</h1>
        </div>
        <a href="#" id="btn-cerrar-sesion" class="btn-volver" style="color: var(--texto-secundario); text-decoration: none;">Cerrar Sesión de Jefe</a>
    </header>

    <main id="contenedor-login">
        <section class="tarjeta-login" style="max-width: 600px;">
            <h2>PUBLICAR NUEVO TRACK</h2>
            <p>Añade música al catálogo oficial de la tienda.</p>

            <form id="form-admin">
                
                <div class="grupo-input">
                    <label for="titulo-track">Título de la Canción / Álbum</label>
                    <input type="text" id="titulo-track" placeholder="Ej. LA NOVENA" required>
                </div>

                <div class="grupo-input">
                    <label for="artista-track">Nombre del Artista</label>
                    <input type="text" id="artista-track" placeholder="Ej. ELADIO CARRION" required>
                </div>

                <div class="grupo-input">
                    <label for="categoria-track">Categoría</label>
                <select id="categoria-track" required style="width: 100%; padding: 12px; border-radius: 5px; border: 1px solid var(--borde-tarjeta); background-color: rgba(255, 255, 255, 0.05); color: white; margin-top: 5px;">
                    <option value="" disabled selected>Selecciona una categoría...</option>
                    <option value="ALBUMES" style="color: black;">Álbumes</option>
                    <option value="SINGLE" style="color: black;">Single</option>
                </select>

                </div>

                <div class="grupo-input">
                    <label for="precio-track">Precio en Dólares ($)</label>
                    <input type="number" id="precio-track" placeholder="1" step="0.01" required>
                </div>

                <div class="grupo-input">
                    <label for="img-track">Sube la Portada (Imagen)</label>
                    <input type="file" id="img-track" accept="image/*" required>
                </div>

                <div class="grupo-input">
                    <label for="audio-track">Sube el Audio (MP3/WAV)</label>
                    <input type="file" id="audio-track" accept="audio/*" required>
                    <p id="texto-multiples" style="display: none; color: #8a2be2; font-size: 12px; margin-top: 5px;">🎵 Puedes seleccionar varias canciones a la vez.</p>
                </div>

                <p id="mensaje-admin" style="color: #8a2be2; font-size: 14px; text-align: center; display: none; margin-top: -10px; margin-bottom: 15px; font-weight: bold;"></p>

                <button type="submit" class="btn-primario" style="width: 100%;">PUBLICAR EN LA TIENDA</button>

            </form>

            <div class="gestor-tracks" style="margin-top: 50px; padding: 20px; background: rgba(255, 255, 255, 0.02); border-radius: 10px; border: 1px solid var(--borde-tarjeta);">
    
            <div id="cabecera-gestor" style="cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">
             <h3 style="color: white; margin: 0;">🎧 Gestor de Música Subida</h3>
             <span id="icono-desplegable" style="color: white; font-size: 16px; transition: transform 0.3s;">▼</span>
    </div>
    
            <div id="lista-admin-tracks" style="display: none; margin-top: 20px;">
     </div>

    </div>

        </section>
    </main>

   <script type="module" src="/assets/js/script.js?v=3.0"></script>
</body>

<script>
    // El guardia del administrador inteligente
    const isAdmin = localStorage.getItem('admin_mc_activo');
    
    if (isAdmin !== 'true') {
        alert("🔒 Acceso denegado. Debes iniciar sesión como Administrador.");
        // Al estar en la misma carpeta 'pages', lo mandamos directo a login.html sin barras
        window.location.href = 'login.html';
    }
</script>

</html>
