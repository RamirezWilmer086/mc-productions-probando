<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | MC PRODUCTIONS</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="/assets/css/login.css">
</head>
<body>
    
    <header id="navbar">
        <div class="logo-container">
            <img src="/assets/img/logo.png" alt="Logo MC" class="logo-img">
            <h1 id="logo-texto">MC PRODUCTIONS</h1>
        </div>
        <a href="/index.html" class="btn-volver" style="color: var(--texto-secundario); text-decoration: none;">Volver al inicio</a>
    </header>

    <main id="contenedor-login">
        <section class="tarjeta-login">
            <h2>CREAR CUENTA</h2>
            <p>Únete a la nueva generación musical.</p>

            
            <form id="form-register">
                
                <div class="grupo-input">
                    <label for="usuario">Nombre de Usuario</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Tu nombre" required>
                </div>

                <div class="grupo-input">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="usuario@email.com" required>
                </div>

                <div class="grupo-input">
                    <label for="password">Contraseña</label>
                    <div style="position: relative;">
                        <input type="password" id="password" name="password" placeholder="********" required style="width: 100%; padding-right: 40px;">
                        <i class='bx bx-hide' id="toggle-password" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 20px; color: gray; cursor: pointer;"></i>
                    </div>
                </div>

                <div class="grupo-input">
                    <label for="confirmar-password">Confirmar Contraseña</label>
                    <div style="position: relative;">
                        <input type="password" id="confirmar-password" name="confirmar-password" placeholder="********" required style="width: 100%; padding-right: 40px;">
                        <i class='bx bx-hide' id="toggle-confirm-password" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 20px; color: gray; cursor: pointer;"></i>
                    </div>
                </div>

                <!-- Mensaje de error oculto -->
                <p id="mensaje-error" style="color: #ff4d4d; font-size: 14px; text-align: center; display: none; margin-top: -10px; margin-bottom: 15px; font-weight: bold;"></p>

                <button type="submit" class="btn-primario" style="width: 100%;">REGISTRARSE</button>

                <p class="texto-registro">¿Ya tienes cuenta? <a href="login.html" style="color: #8a2be2;">Inicia sesión aquí</a></p>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 MC Productions. Todos los derechos reservados.</p>
    </footer>

    <script type="module" src="/assets/js/script.js?v=2.1"></script>
</body>
</html>
